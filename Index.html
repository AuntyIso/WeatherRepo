<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather Repo</title>
</head>
<body>
    <div class="weatherrepo">
    <header>
        <form id="search-form">
            <input type="search" placeholder="Enter a City.." required  
            class="search-input"
            id="search-input" />
            <input type="submit" value="search" class="search-button" />
        </form>
    </header>
    <main>
        <div class="global-weather">
        <div>
        <h1 class="current-city" id="current-city">Paris</h1>
        <p class="current-details">
            <span id="current-date"></span>Tuesday 14:49, scattered clouds 
        <br />
        Humidity: <strong>66%</strong>, Wind: <strong>3.13km/h</strong>   
        </p>
        </div>
        <div class="temperature-now-container">
            <span class="temperature-now-icon">🌤️</span>
            <span class="temperature-now-value" id="temperature-now">12</span>
            <span class="temperature-now-unit"><sup>oc</sup></span> 
        </div>
        </div>
    </main>
    <footer>
        <p> 
        This project was Coded by 
        <a href="https://github.com/AuntyIso/" target="_blank">Grace Care,</a>
        open source code hosted on
        <a href="https://github.com" target="_blank">Github</a>
        and website hosted on
        <a href="https://app.netlify.com" target="_blank">Netlify.</a>
        </p>
     </footer>
    </div>
</body>
