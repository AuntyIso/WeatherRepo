 <!DOCTYPE html>
<html lang=  "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Weather Repo</title>
</head>
<body> 
    <div class="weatherrepo">
    <header>
        <form class="search-form" id="search-form">
            <input type="search" placeholder="Enter a City.." required  
            id="search-form-input" class="search-form-input" />
            <input type="submit" value="search" class="search-form-button" />
        </form>
    </header>
    <main>
        <div class="weatherrepo-data">
        <div>
        <h1 class="city" id="city">Paris</h1>
        <p class="details">
            <span id="current-date"></span>Tuesday 14:49, scattered clouds 
        <br />
        Humidity: <strong>66%</strong>, Wind: <strong>3.13km/h</strong>   
        </p>
        </div>
        <div class="temperature-container"> 
            <span class="temperature-icon">🌤️</span>
            <span class="temperature-value" id="temperature-value">12</span>
            <span class="temperature-unit"><sup>oc</sup></span> 
        </div>
        </div>
    </main>
    <footer>
        <p> 
        <em>
        This project was Coded by 
        <a href="https://github.com/AuntyIso/" target="_blank">Grace Care,</a>
        open source code hosted on
        <a href="https://github.com" target="_blank">Github</a>
        and website hosted on
        <a href="https://app.netlify.com" target="_blank">Netlify.</a>
        </em>
        </p>
     </footer>
    </div>
    <script> src="src/index.js"</script> 
</body
</html>
